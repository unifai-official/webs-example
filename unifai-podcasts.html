      <h1 className="font-extrabold text-neutral-900 mb-4" style={{fontSize:30,letterSpacing:"-0.03em"}}>{cat.title}</h1>
      <SectionHeader title="תוכניות"/>
      {shows.length?<Carousel>{shows.map(s=><ShowCard key={s.id} show={s}/>)}</Carousel>:<EmptyState text="אין תוכניות בקטגוריה"/>}
      <div style={{height:28}}/>
      <SectionHeader title="פרקים אחרונים"/>
      <div>{eps.map(ep=><EpisodeRow key={ep.id} ep={ep}/>)}</div>
      <div className="h-28"/>
    </div>
  );
}
function ChartsScreen(){
  const top=[...SHOWS].sort((a,b)=>b.plays-a.plays);
  return (
    <div className="px-4 pt-2">
      <h1 className="font-extrabold text-neutral-900 mb-4" style={{fontSize:30,letterSpacing:"-0.03em"}}>Top Charts</h1>
      <SectionHeader title="Top Shows"/>
      <div>{top.map((s,i)=><ChartRow key={s.id} show={s} rank={i+1}/>)}</div>
      <div className="h-28"/>
    </div>
  );
}

/* ----------------------------- PLAYER UI ----------------------------- */
function MiniPlayer(){
  const {current,isPlaying,toggle,openNowPlaying,skip}=usePlayer(); if(!current)return null;
  const show=showById(current.show);
  return (
    <button onClick={openNowPlaying} className="flex items-center gap-3 active:opacity-90 mx-3" style={{padding:"8px 10px",marginBottom:8,borderRadius:18,background:"rgba(250,250,250,0.72)",backdropFilter:"blur(24px) saturate(180%)",WebkitBackdropFilter:"blur(24px) saturate(180%)",border:"1px solid rgba(255,255,255,0.6)",boxShadow:"0 8px 30px rgba(0,0,0,0.12)",width:"calc(100% - 24px)"}}>
      <Artwork item={current} size={40} radius={9}/>
      <div className="flex-1 min-w-0 text-right">
        <div className="font-semibold text-neutral-900 truncate" style={{fontSize:14}}>{current.title}</div>
        <div className="text-neutral-500 truncate" style={{fontSize:12}}>{show.title}</div>
      </div>
      <div onClick={e=>{e.stopPropagation();toggle();}} className="w-9 h-9 flex items-center justify-center text-neutral-900">{isPlaying?<Pause size={20} fill="currentColor"/>:<Play size={20} fill="currentColor"/>}</div>
      <div onClick={e=>{e.stopPropagation();skip(30);}} className="w-9 h-9 flex items-center justify-center text-neutral-900"><SkipForward size={20} fill="currentColor"/></div>
    </button>
  );
}
function Popover({title,children,onClose}){
  return (
    <div className="absolute bg-white text-neutral-900 rounded-2xl p-4 shadow-2xl" style={{bottom:64,left:0,right:0,marginInline:"auto",width:"85%",zIndex:5}}>
      <div className="flex items-center justify-between mb-3"><span className="font-bold" style={{fontSize:15}}>{title}</span><button onClick={onClose}><X size={18} className="text-neutral-400"/></button></div>
      {children}
    </div>
  );
}
function SidePanel({open,onClose,title,children}){
  return (
    <div className="absolute inset-0 transition-transform bg-white" style={{zIndex:6,transform:open?"translateY(0)":"translateY(110%)"}}>
      <div className="flex items-center justify-between px-5 py-4" style={{borderBottom:"1px solid #f5f5f5"}}>
        <span className="font-extrabold text-neutral-900" style={{fontSize:20}}>{title}</span>
        <button onClick={onClose} className="w-8 h-8 rounded-full bg-neutral-100 flex items-center justify-center"><ChevronDown size={20} className="text-neutral-600"/></button>
      </div>
      <div className="px-5 py-3 overflow-y-auto" style={{height:"calc(100% - 60px)"}}>{children}</div>
    </div>
  );
}
function Transcript({ep,position,seek}){
  const lines=[[0,"שלום וברוכים הבאים לפרק חדש."],[12,"היום נצלול לאחד הנושאים המעניינים בתחום."],[28,"בואו נתחיל מהבסיס ונבין מה באמת קורה כאן."],[55,"זו נקודה שאנשים רבים מפספסים."],[90,"ועכשיו, החלק שהכי מסקרן אותי."],[140,"תודה שהאזנתם, נתראה בפרק הבא."]];
  return (
    <div>
      {lines.map(([t,text],i)=>{const next=lines[i+1]?.[0]??ep.dur;const active=position>=t&&position<next;
        return <button key={i} onClick={()=>seek(t)} className={`block w-full text-right py-2.5 ${active?"text-neutral-900 font-semibold":"text-neutral-300"}`} style={{fontSize:16,lineHeight:1.5}}>{text}</button>;})}
      <div className="text-neutral-300 text-center py-4" style={{fontSize:11}}>תמלול מסונכרן · הקישו על שורה כדי לדלג</div>
    </div>
  );
}
function NowPlaying(){
  const p=usePlayer();
  const {current,isPlaying,toggle,position,skip,seek,speed,setSpeed,sleep,setSleep,nowPlayingOpen,closeNowPlaying,engaged,queue}=p;
  const [panel,setPanel]=useState(null); const [pop,setPop]=useState(null);
  useEffect(()=>{if(!nowPlayingOpen){setPanel(null);setPop(null);}},[nowPlayingOpen]);
  if(!current)return null;
  const show=showById(current.show); const [a,b]=gradOf(show.cat);
  const isEng=engaged.has(current.id); const remaining=current.dur-position;
  return (
    <div className="absolute inset-0 transition-transform overflow-hidden" style={{zIndex:40,transform:nowPlayingOpen?"translateY(0)":"translateY(110%)"}}>
      <div className="absolute inset-0" style={{background:`linear-gradient(180deg, ${a}, ${b})`}}/>
      <div className="absolute inset-0" style={{background:"rgba(0,0,0,0.18)"}}/>
      <Noise opacity={0.05}/>
      <div className="relative h-full flex flex-col px-6 pt-3 pb-7 text-white">
        <div className="flex justify-center pt-1"><button onClick={closeNowPlaying} className="active:opacity-60"><ChevronDown size={28}/></button></div>
        <div className="flex-1 flex flex-col justify-center">
          <div className="flex justify-center mb-7">
            <div className="relative overflow-hidden flex items-end" style={{width:210,height:210,borderRadius:18,background:`linear-gradient(145deg, ${a}, ${b})`,boxShadow:"0 24px 60px rgba(0,0,0,0.4)",transform:isPlaying?"scale(1)":"scale(0.86)",transition:"transform 0.4s ease"}}>
              <Noise/><div className="relative font-extrabold" style={{padding:12,fontSize:22}}>{current.title}</div>
            </div>
          </div>
          <div className="flex items-start justify-between mb-1">
            <div className="min-w-0 flex-1">
              <div className="font-bold truncate" style={{fontSize:20}}>{current.title}</div>
              <div className="opacity-80 truncate" style={{fontSize:15}}>{show.title}</div>
            </div>
            <button className="w-9 h-9 rounded-full bg-white\/20 flex items-center justify-center active:opacity-70 mt-1"><Star size={16}/></button>
          </div>
          {isEng&&<div style={{marginTop:8,marginBottom:16}}><HowBadge tool={show.tool} big/></div>}
          <div className="mt-4">
            <input type="range" min={0} max={current.dur} value={position} onChange={e=>seek(Number(e.target.value))} className="w-full" style={{accentColor:"#fff"}}/>
            <div className="flex justify-between opacity-80 tabular-nums" style={{fontSize:12}}><span>{fmt(position)}</span><span>-{fmt(remaining)}</span></div>
          </div>
          <div className="flex items-center justify-center gap-10 mt-5">
            <button onClick={()=>skip(-15)} className="relative active:opacity-60"><SkipBack size={30}/><span className="absolute inset-0 flex items-center justify-center font-bold" style={{fontSize:9}}>15</span></button>
            <button onClick={toggle} className="w-16 h-16 rounded-full bg-white\/95 text-neutral-900 flex items-center justify-center active:scale-95 transition-transform">{isPlaying?<Pause size={30} fill="currentColor"/>:<Play size={30} fill="currentColor"/>}</button>
            <button onClick={()=>skip(30)} className="relative active:opacity-60"><SkipForward size={30}/><span className="absolute inset-0 flex items-center justify-center font-bold" style={{fontSize:9}}>30</span></button>
          </div>
        </div>
        <div className="flex items-center justify-around relative pt-3">
          <button onClick={()=>setPop(pop==="speed"?null:"speed")} className="flex flex-col items-center gap-1 active:opacity-60"><Gauge size={20}/><span style={{fontSize:10}}>{speed}x</span></button>
          <button onClick={()=>setPop(pop==="sleep"?null:"sleep")} className="flex flex-col items-center gap-1 active:opacity-60"><Moon size={20}/><span style={{fontSize:10}}>{sleep?`${sleep}'`:"טיימר"}</span></button>
          <button onClick={()=>setPanel(panel==="transcript"?null:"transcript")} className="flex flex-col items-center gap-1 active:opacity-60"><FileText size={20}/><span style={{fontSize:10}}>תמלול</span></button>
          <button onClick={()=>setPanel(panel==="queue"?null:"queue")} className="flex flex-col items-center gap-1 active:opacity-60"><ListMusic size={20}/><span style={{fontSize:10}}>תור</span></button>
          {pop==="speed"&&(
            <Popover onClose={()=>setPop(null)} title="מהירות נגינה">
              <div className="grid grid-cols-4 gap-2">{[0.8,1,1.2,1.5,1.75,2,2.5,3].map(s=>(
                <button key={s} onClick={()=>{setSpeed(s);setPop(null);}} className={`rounded-lg font-semibold ${speed===s?"bg-neutral-900 text-white":"bg-neutral-100 text-neutral-900"}`} style={{fontSize:13,padding:"8px 0"}}>{s}x</button>
              ))}</div>
              <div className="text-neutral-400 text-center mt-2" style={{fontSize:11}}>0.5x–3x · צעדים של 0.1x</div>
            </Popover>
          )}
          {pop==="sleep"&&(
            <Popover onClose={()=>setPop(null)} title="טיימר שינה">
              <div className="grid grid-cols-3 gap-2">
                {[5,10,15,30,45,60].map(m=>(<button key={m} onClick={()=>{setSleep(m);setPop(null);}} className={`rounded-lg font-semibold ${sleep===m?"bg-neutral-900 text-white":"bg-neutral-100 text-neutral-900"}`} style={{fontSize:13,padding:"8px 0"}}>{m} דק'</button>))}
                <button onClick={()=>{setSleep(0);setPop(null);}} className="rounded-lg font-semibold bg-neutral-100 text-neutral-900 col-span-3" style={{fontSize:13,padding:"8px 0"}}>כבה</button>
              </div>
            </Popover>
          )}
        </div>
      </div>
      <SidePanel open={panel==="queue"} onClose={()=>setPanel(null)} title="הבא בתור">
        {queue.length===0?<div className="text-neutral-500 text-center py-6" style={{fontSize:14}}>התור ריק</div>:queue.map(id=>{const e=epById(id);return (
          <div key={id} className="flex items-center gap-3 py-3 border-b"><Artwork item={e} size={44} radius={9}/><div className="flex-1 min-w-0"><div className="font-semibold text-neutral-900 truncate" style={{fontSize:14}}>{e.title}</div><div className="text-neutral-500 truncate" style={{fontSize:12}}>{showById(e.show).title}</div></div></div>);})}
      </SidePanel>
      <SidePanel open={panel==="transcript"} onClose={()=>setPanel(null)} title="תמלול"><Transcript ep={current} position={position} seek={seek}/></SidePanel>
    </div>
  );
}

/* ----------------------------- SHELL ----------------------------- */
function StatusBar(){
  return (
    <div className="relative flex items-center justify-between px-7 pt-3 pb-1 select-none" style={{height:48}}>
      <span className="font-semibold text-neutral-900 tabular-nums" style={{fontSize:15}}>9:41</span>
      <div className="absolute bg-neutral-900 rounded-full left-1/2 -translate-x-1/2" style={{width:92,height:28,top:10,background:"#000"}}/>
      <div className="flex items-center gap-1.5">
        <div className="flex items-end gap-0.5" style={{height:11}}>{[4,6,8,10].map((h,i)=><div key={i} className="rounded-sm" style={{width:3,height:h,background:"#171717"}}/>)}</div>
        <div className="relative border-2 border-neutral-900 rounded-sm" style={{width:22,height:11}}><div className="absolute rounded-sm" style={{top:1,bottom:1,right:1,width:"60%",background:"#171717"}}/></div>
      </div>
    </div>
  );
}
function TabBar(){
  const {setTab,route}=useNav();
  const tabs=[{id:"home",label:"בית",Icon:HomeI},{id:"new",label:"חדש",Icon:Sparkles},{id:"library",label:"ספרייה",Icon:Library}];
  const activeTab=["show","episode","category","charts"].includes(route.name)?route._tab:route.name;
  const glass={background:"rgba(250,250,250,0.72)",backdropFilter:"blur(24px) saturate(180%)",WebkitBackdropFilter:"blur(24px) saturate(180%)",border:"1px solid rgba(255,255,255,0.6)",boxShadow:"0 8px 30px rgba(0,0,0,0.12)"};
  return (
    <div className="flex items-center gap-2 px-3 pb-3">
      <div className="flex-1 flex items-center justify-around" style={{padding:"8px 8px",borderRadius:26,...glass}}>
        {tabs.map(({id,label,Icon})=>{const active=activeTab===id;return (
          <button key={id} onClick={()=>setTab(id)} className="flex flex-col items-center gap-0.5 px-3 active:opacity-60" style={{color:active?"#dc2626":"#71717a"}}>
            <Icon size={22} fill={active?"currentColor":"none"} strokeWidth={active?1.5:2}/><span className="font-medium" style={{fontSize:10}}>{label}</span>
          </button>
        );})}
      </div>
      <button onClick={()=>setTab("search")} className="flex items-center justify-center active:opacity-60" style={{width:56,height:56,borderRadius:28,color:activeTab==="search"?"#dc2626":"#71717a",...glass}}><SearchI size={24}/></button>
    </div>
  );
}

/* ----------------------------- APP ----------------------------- */
function App(){
  const [tab,setTabState]=useState("home");
  const [stack,setStack]=useState([{name:"home"}]);
  const route=stack[stack.length-1];
  const scrollRef=useRef(null); const phoneRef=useRef(null);
  const [scale,setScale]=useState(1);

  const push=useCallback((r)=>setStack(s=>[...s,{...r,_tab:tab}]),[tab]);
  const back=useCallback(()=>setStack(s=>s.length>1?s.slice(0,-1):s),[]);
  const setTab=useCallback((t)=>{setTabState(t);setStack([{name:t}]);},[]);
  useEffect(()=>{if(scrollRef.current)scrollRef.current.scrollTop=0;},[stack]);

  // responsive scale
  useEffect(()=>{
    const fit=()=>setScale(Math.min(1,(window.innerWidth-16)/390,(window.innerHeight-16)/800));
    fit();window.addEventListener("resize",fit);return()=>window.removeEventListener("resize",fit);
  },[]);

  const [current,setCurrent]=useState(null);
  const [isPlaying,setIsPlaying]=useState(false);
  const [position,setPosition]=useState(0);
  const [speed,setSpeed]=useState(1);
  const [sleep,setSleep]=useState(0);
  const [nowPlayingOpen,setNowPlayingOpen]=useState(false);
  const [queue]=useState([]);
  const [follows,setFollows]=useState(new Set(["beyond-code","science-minute"]));
  const [saved,setSaved]=useState(new Set(["ns1"]));
  const [progress,setProgress]=useState({bc1:810,mk1:383});
  const [engaged,setEngaged]=useState(new Set());
  const [howTool,setHowTool]=useState(null);
  const [toast,setToast]=useState(null);
  const engageRef=useRef(0);

  const play=useCallback((ep,at=null)=>{
    setCurrent(ep); setPosition(at!=null?at:(progress[ep.id]||0)); setIsPlaying(true);
    engageRef.current=engaged.has(ep.id)?999:0;
  },[progress,engaged]);
  const toggle=useCallback(()=>setIsPlaying(v=>!v),[]);
  const seek=useCallback(s=>setPosition(s),[]);
  const skip=useCallback(d=>setPosition(p=>Math.max(0,Math.min(current?.dur||0,p+d))),[current]);
  const toggleFollow=useCallback(id=>setFollows(s=>{const n=new Set(s);n.has(id)?n.delete(id):n.add(id);return n;}),[]);
  const toggleSave=useCallback(id=>setSaved(s=>{const n=new Set(s);n.has(id)?n.delete(id):n.add(id);return n;}),[]);
  const openNowPlaying=useCallback(()=>setNowPlayingOpen(true),[]);
  const closeNowPlaying=useCallback(()=>setNowPlayingOpen(false),[]);
  const openHow=useCallback(t=>setHowTool(t),[]);
  const closeHow=useCallback(()=>setHowTool(null),[]);

  useEffect(()=>{
    if(!isPlaying||!current)return;
    const iv=setInterval(()=>{
      setPosition(pp=>{const np=pp+speed;if(np>=current.dur){setIsPlaying(false);return current.dur;}return np;});
      setProgress(pr=>({...pr,[current.id]:Math.min(current.dur,(pr[current.id]||0)+speed)}));
      engageRef.current+=1;
      if(engageRef.current===4&&!engaged.has(current.id)){
        setEngaged(s=>new Set(s).add(current.id));
        setToast("גלו איך הפרק הזה נוצר"); setTimeout(()=>setToast(null),3500);
      }
    },1000);
    return()=>clearInterval(iv);
  },[isPlaying,current,speed,engaged]);

  const renderScreen=()=>{
    switch(route.name){
      case "home":return <HomeScreen/>;
      case "new":return <NewScreen/>;
      case "library":return <LibraryScreen/>;
      case "search":return <SearchScreen/>;
      case "show":return <ShowScreen id={route.id}/>;
      case "episode":return <EpisodeScreen id={route.id}/>;
      case "category":return <CategoryScreen id={route.id}/>;
      case "charts":return <ChartsScreen/>;
      default:return <HomeScreen/>;
    }
  };
  const canBack=stack.length>1;

  return (
    <div id="phone-wrap" ref={phoneRef} style={{transform:`scale(${scale})`}}>
      <div className="relative bg-white overflow-hidden" style={{width:390,height:800,borderRadius:44,boxShadow:"0 40px 100px rgba(0,0,0,0.35), 0 0 0 11px #1c1917, 0 0 0 13px #44403c"}}>
        <Nav.Provider value={{tab,setTab,push,back,route,canBack}}>
          <Player.Provider value={{current,isPlaying,position,speed,sleep,queue,follows,saved,progress,engaged,howTool,nowPlayingOpen,play,toggle,seek,skip,setSpeed,setSleep,toggleFollow,toggleSave,openNowPlaying,closeNowPlaying,openHow,closeHow}}>
            <div className="relative h-full flex flex-col">
              <StatusBar/>
              {canBack&&(
                <button onClick={back} className="absolute flex items-center justify-center active:opacity-60" style={{top:52,right:12,zIndex:20,width:36,height:36,borderRadius:18,background:"rgba(255,255,255,0.7)",backdropFilter:"blur(12px)",boxShadow:"0 2px 10px rgba(0,0,0,0.12)"}}><ChevronRight size={22} className="text-neutral-900"/></button>
              )}
              <div ref={scrollRef} className="flex-1 overflow-y-auto overflow-x-hidden">{renderScreen()}</div>
              <div className="absolute left-0 right-0 bottom-0" style={{zIndex:30}}><MiniPlayer/><TabBar/></div>
              <NowPlaying/>
              <HowSheet/>
              <div className="absolute left-0 right-0 flex justify-center transition-all" style={{bottom:150,zIndex:60,opacity:toast?1:0,transform:toast?"translateY(0)":"translateY(10px)",pointerEvents:"none"}}>
                {toast&&<div className="flex items-center gap-2 text-white font-semibold rounded-full" style={{fontSize:13,padding:"10px 16px",background:"rgba(28,25,23,0.92)",backdropFilter:"blur(12px)",boxShadow:"0 8px 24px rgba(0,0,0,0.3)"}}><Wand2 size={15}/> {toast}</div>}
              </div>
            </div>
          </Player.Provider>
        </Nav.Provider>
      </div>
    </div>
  );
}

ReactDOM.createRoot(document.getElementById("root")).render(<App/>);
</script>
</body>
</html>
