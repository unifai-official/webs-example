/* ─── Hooks ─── */
function useFade(threshold = 0.12) {
  const ref = useRef(null);
  const [vis, setVis] = useState(false);
  useEffect(() => {
    const el = ref.current;
    if (!el) return;
    const obs = new IntersectionObserver(
      ([e]) => { if (e.isIntersecting) { setVis(true); obs.disconnect(); } },
      { threshold }
    );
    obs.observe(el);
    return () => obs.disconnect();
  }, [threshold]);
  return [ref, vis];
}

/* ─── Animated element wrapper ─── */
function Reveal({ children, delay = 0, y = 32, style = {} }) {
  const [ref, vis] = useFade();
  return (
    <div ref={ref} style={{
      opacity: vis ? 1 : 0,
      transform: vis ? "translateY(0)" : `translateY(${y}px)`,
      transition: `opacity 0.9s cubic-bezier(0.25,1,0.5,1) ${delay}s, transform 0.9s cubic-bezier(0.25,1,0.5,1) ${delay}s`,
      ...style,
    }}>
      {children}
    </div>
  );
}

                    <div style={{ fontFamily: "'DM Sans', sans-serif", fontSize: 28, fontWeight: 700, color: "#1d1d1f" }}>{s.n}</div>

/* ─── Contact ─── */
function Contact() {
  const [form, setForm] = useState({ name: "", phone: "", msg: "" });
  const [sent, setSent] = useState(false);
  const [focused, setFocused] = useState(null);
  const upd = (k, v) => setForm(p => ({ ...p, [k]: v }));

  const inputBox = (field, label, placeholder, type = "text") => (
    <div style={{ position: "relative" }}>
      <label style={{ fontFamily: "'Assistant', sans-serif", fontSize: 13, fontWeight: 600, color: "#86868b", display: "block", marginBottom: 8 }}>{label}</label>
      <input type={type} value={form[field]} onChange={e => upd(field, e.target.value)}
        onFocus={() => setFocused(field)} onBlur={() => setFocused(null)}
        placeholder={placeholder}
        style={{
          width: "100%", padding: "14px 18px", borderRadius: 12,
          background: "#f5f5f7", border: `2px solid ${focused === field ? "#0071e3" : "transparent"}`,
          fontFamily: "'Assistant', sans-serif", fontSize: 16, color: "#1d1d1f", outline: "none",
          transition: "all 0.35s cubic-bezier(0.25,1,0.5,1)", boxSizing: "border-box",
        }} />

  );

  if (sent) {
    return (
      <section id="contact" style={{ padding: "100px 24px", background: "#f5f5f7" }}>
        <Reveal>
          <div style={{ textAlign: "center", maxWidth: 480, margin: "0 auto" }}>
            <div style={{
              width: 72, height: 72, borderRadius: "50%", background: "rgba(52,199,89,0.1)",
              display: "flex", alignItems: "center", justifyContent: "center", margin: "0 auto 24px",
              fontSize: 32, color: "#34c759",
            }}>✓</div>
            <h3 style={{ fontFamily: "'DM Sans', sans-serif", fontSize: 28, fontWeight: 700, color: "#1d1d1f", marginBottom: 12 }}>הבקשה נשלחה!</h3>
            <p style={{ fontFamily: "'Assistant', sans-serif", fontSize: 17, color: "#86868b", lineHeight: 1.6 }}>תודה {form.name}, ניצור איתך קשר בהקדם לקביעת פגישת ייעוץ.</p>
          </div>
        </Reveal>
      </section>
    );
  }

  return (
    <section id="contact" style={{ padding: "100px 24px", background: "#f5f5f7" }}>
      <div style={{ maxWidth: 520, margin: "0 auto" }}>
        <Reveal>
          <div style={{ textAlign: "center", marginBottom: 50 }}>
            <p style={{ fontFamily: "'Assistant', sans-serif", fontSize: 13, fontWeight: 600, color: "#0071e3", letterSpacing: 2, marginBottom: 10 }}>בואו נתחיל</p>
            <h2 style={{ fontFamily: "'DM Sans', sans-serif", fontSize: "clamp(28px, 4vw, 44px)", fontWeight: 700, color: "#1d1d1f", letterSpacing: "-0.02em" }}>קביעת תור</h2>
          </div>
        </Reveal>
        <Reveal delay={0.15}>
          <div style={{ background: "#fff", borderRadius: 24, padding: "40px 32px", boxShadow: "0 2px 20px rgba(0,0,0,0.04)" }}>
            <div style={{ display: "flex", flexDirection: "column", gap: 20, marginBottom: 28 }}>
              {inputBox("name", "שם מלא", "איך קוראים לכם?")}
              {inputBox("phone", "טלפון", "052-0000000", "tel")}
              <div>
                <label style={{ fontFamily: "'Assistant', sans-serif", fontSize: 13, fontWeight: 600, color: "#86868b", display: "block", marginBottom: 8 }}>ספרו לנו על הרעיון</label>
                <textarea value={form.msg} onChange={e => upd("msg", e.target.value)}
                  onFocus={() => setFocused("msg")} onBlur={() => setFocused(null)}
                  rows={4} placeholder="תארו את הקעקוע שחלמתם עליו..."
                  style={{
                    width: "100%", padding: "14px 18px", borderRadius: 12,
                    background: "#f5f5f7", border: `2px solid ${focused === "msg" ? "#0071e3" : "transparent"}`,
                    fontFamily: "'Assistant', sans-serif", fontSize: 16, color: "#1d1d1f", outline: "none",
                    resize: "vertical", transition: "all 0.35s cubic-bezier(0.25,1,0.5,1)", boxSizing: "border-box",
                  }} />
              </div>
            </div>
            <button onClick={() => { if (form.name && form.phone) setSent(true); }} style={{
              width: "100%", padding: "16px",
              background: (form.name && form.phone) ? "#0071e3" : "#d2d2d7",
              color: "#fff", border: "none", borderRadius: 14,
              fontFamily: "'Assistant', sans-serif", fontSize: 17, fontWeight: 600,
              cursor: (form.name && form.phone) ? "pointer" : "default",
              transition: "all 0.4s cubic-bezier(0.25,1,0.5,1)",
            }} onMouseEnter={e => { if (form.name && form.phone) e.target.style.background = "#0077ed"; }}
               onMouseLeave={e => { if (form.name && form.phone) e.target.style.background = "#0071e3"; }}>
              שליחת בקשה
            </button>
            <div style={{ textAlign: "center", marginTop: 20 }}>
              <span style={{ fontFamily: "'Assistant', sans-serif", fontSize: 14, color: "#86868b" }}>או שלחו הודעה ישירה ב</span>
              <a href={`https://wa.me/${BRAND.phoneFull}?text=שלום, אשמח לקבוע פגישת ייעוץ`} target="_blank" rel="noopener noreferrer"

                וואטסאפ ←
              </a>
            </div>
          </div>
        </Reveal>
      </div>
    </section>
  );
}

        @import url('https://fonts.googleapis.com/css2?family=Assistant:wght@300;400;500;600;700&family=DM+Sans:ital,wght@0,400;0,500;0,600;0,700;1,400&display=swap');
